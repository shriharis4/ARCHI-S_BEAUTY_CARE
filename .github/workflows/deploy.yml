name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_APPOINTMENT_API_URL: https://script.google.com/macros/s/AKfycbwQ1PjrDkEsjw2XfM48blaoG4NX9w2Yt9nelb5Ke8eDKtOb4fBY9otb7Ur_kbCGvZSg/exec
          NEXT_PUBLIC_WHATSAPP_NUMBER: 917619621584
          NEXT_PUBLIC_PHONE_NUMBER: 919731490728
      - run: touch out/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
